spring:
  application:
    name: pairflow-api

  # Default: PostgreSQL, schema owned by Flyway. For zero-setup H2 instead,
  # run with the "h2" profile:  mvn spring-boot:run -Dspring-boot.run.profiles=h2
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pairflow}
    username: ${DB_USERNAME:pairflow}
    password: ${DB_PASSWORD:pairflow}

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns the schema; JPA only validates it
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

  jackson:
    default-property-inclusion: non_null

server:
  port: 8080

pairflow:
  jwt:
    secret: ${PAIRFLOW_JWT_SECRET:dev-secret-change-me-please-use-a-long-random-value-0123456789abcdef}
    access-expiration-hours: 1        # access token: 1 hour; refresh token is 30 days (RefreshToken entity)
  cors:
    allowed-origins: http://localhost:4200,http://localhost:5173
  storage:
    upload-dir: ./uploads
  ai:
    provider: ${PAIRFLOW_AI_PROVIDER:stub}      # stub | anthropic
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      model: claude-opus-4-8
  push:
    fcm:
      # Uncomment to activate FcmPushSender (LoggingPushSender is used when absent)
      # service-account-file: ${PAIRFLOW_FCM_SA_FILE:}

logging:
  level:
    org.hibernate.SQL: warn
