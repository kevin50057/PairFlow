spring:
  application:
    name: pairflow-api

  datasource:
    url: jdbc:h2:file:./data/pairflow;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update          # dev convenience; use Flyway + validate in prod
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  h2:
    console:
      enabled: true
      path: /h2-console

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

  jackson:
    default-property-inclusion: non_null

server:
  port: 8080

pairflow:
  jwt:
    secret: ${PAIRFLOW_JWT_SECRET:dev-secret-change-me-please-use-a-long-random-value-0123456789abcdef}
    access-expiration-hours: 1        # access token: 1 hour; refresh token is 30 days (RefreshToken entity)
  cors:
    allowed-origins: http://localhost:4200,http://localhost:5173
  storage:
    upload-dir: ./uploads
  ai:
    provider: ${PAIRFLOW_AI_PROVIDER:stub}      # stub | anthropic
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      model: claude-opus-4-8
  push:
    fcm:
      # Uncomment to activate FcmPushSender (LoggingPushSender is used when absent)
      # service-account-file: ${PAIRFLOW_FCM_SA_FILE:}

logging:
  level:
    org.hibernate.SQL: warn
